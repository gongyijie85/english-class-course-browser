services:
  - type: web
    name: english-class-course-browser
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /pdf/*
        name: Cache-Control
        value: public, max-age=86400
